<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ארכיון חטיבת החדשות — בדיקת ליינאפ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f4f5f7;
  --white: #ffffff;
  --border: #dfe2e8;
  --text: #1d2433;
  --muted: #6b7280;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --red-border: #fecaca;
  --amber: #b45309;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --gray-cat: #64748b;
  --gray-bg: #f8fafc;
  --gray-border: #e2e8f0;
  --mono: 'Courier New', monospace;
  --sans: 'Heebo', sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 0 0 80px;
}

/* Header bar */
.top-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  height: 40px;
  object-fit: contain;
}
.top-bar h1 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -.01em;
  color: var(--text);
}
.top-bar .sep {
  width: 1px;
  height: 28px;
  background: var(--border);
}
.top-bar .sub {
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
}
.lamp {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--border);
  margin-right: auto;
  margin-left: 8px;
  transition: all .4s;
}
.lamp.ok { background: var(--green); box-shadow: 0 0 8px rgba(22,163,74,.4); }
.lamp.alert { background: var(--red); box-shadow: 0 0 8px rgba(220,38,38,.4); }

.wrap { max-width: 1240px; margin: 0 auto; padding: 28px 24px 0; }

/* Upload row */
.upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 700px) { .upload-row { grid-template-columns: 1fr; } }
.upload-box {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 20px;
  text-align: center;
}
.upload-box input[type=file] { display: none; }
.ub-icon { font-size: 26px; margin-bottom: 6px; }
.ub-label { font-size: 14px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
.ub-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.ub-btn {
  display: inline-block;
  font-family: var(--sans); font-weight: 600; font-size: 12.5px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 7px 16px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
}
.ub-btn:hover { background: #e8eaee; }
.ub-file-name {
  margin-top: 10px;
  font-family: var(--mono); font-size: 11.5px;
  color: var(--accent); min-height: 18px;
}

/* Run bar */
.run-bar { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
button {
  font-family: var(--sans); font-weight: 700; font-size: 13.5px;
  border: none; border-radius: 8px; padding: 10px 22px;
  cursor: pointer; transition: filter .15s, transform .08s;
}
button:active { transform: scale(.97); }
button:disabled { opacity: .35; cursor: not-allowed; }
.btn-go { background: var(--accent); color: #fff; }
.btn-go:hover:not(:disabled) { background: var(--accent-hover); }
.btn-ghost { background: var(--white); border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--bg); }
.status-msg { font-size: 12.5px; color: var(--muted); }
.status-msg.err { color: var(--red); }

/* Ignore bar */
.ignore-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px; flex-wrap: wrap;
}
.ignore-bar .il-label { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
.ignore-tokens { display: flex; flex-wrap: wrap; gap: 5px; }
.ignore-token {
  font-family: var(--mono); font-size: 10px;
  background: var(--white); border: 1px solid var(--border);
  color: var(--muted); padding: 2px 7px; border-radius: 4px;
}

/* Cards */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  margin-top: 18px;
}
.card[hidden] { display: none; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  font-size: 12px; color: var(--muted);
  background: var(--bg); border: 1px solid var(--border);
  padding: 5px 14px; border-radius: 20px;
}
.chip b { color: var(--text); }

/* Results grid — adapts to visible columns */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  align-items: start;
}
@media (max-width: 900px) { .results-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .results-grid { grid-template-columns: 1fr; } }

.result-col {
  border-radius: 10px;
  overflow: hidden;
}
.col-header {
  padding: 11px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12.5px;
  font-weight: 700;
}
.col-red { border: 1px solid var(--red-border); }
.col-red .col-header { background: var(--red-bg); color: var(--red); }
.col-amber { border: 1px solid var(--amber-border); }
.col-amber .col-header { background: var(--amber-bg); color: var(--amber); }
.col-gray { border: 1px solid var(--gray-border); }
.col-gray .col-header { background: var(--gray-bg); color: var(--gray-cat); }
.col-excluded { border: 1px solid #e0dff0; }
.col-excluded .col-header { background: #f5f4fb; color: #7c6fae; }
.badge {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 2px 9px; border-radius: 20px;
  background: rgba(0,0,0,.07);
}
.col-body { max-height: 420px; overflow-y: auto; }
.id-row {
  font-family: var(--mono); font-size: 11.5px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  direction: ltr; text-align: left;
  word-break: break-all;
  line-height: 1.5;
  background: var(--white);
}
.id-row:last-child { border-bottom: none; }
.warn-line {
  font-size: 10px; color: var(--amber); font-family: var(--sans);
  margin-top: 2px;
}
.empty-ok {
  text-align: center; padding: 18px 14px;
  color: var(--green); font-size: 13px;
  background: var(--green-bg);
}

/* Ignored */
details { margin-top: 14px; }
summary { cursor: pointer; color: var(--muted); font-size: 12px; }
.ignored-content {
  margin-top: 8px; font-family: var(--mono); font-size: 11px;
  color: var(--muted); direction: ltr; text-align: left; line-height: 2;
}

/* Parse info */
.parse-info {
  margin-top: 12px; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; color: var(--muted); line-height: 1.7;
}

/* Actions */
.actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

/* Edit panel */
.edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .edit-row { grid-template-columns: 1fr; } }
.field-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 12px;
  line-height: 1.7; padding: 12px; border-radius: 8px;
  resize: vertical; direction: ltr; text-align: left;
}
input[type=text] {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 9px 12px; border-radius: 8px;
}
</style>
</head>

    <h1>ארכיון חטיבת החדשות</h1>

<div class="wrap">

<script>
const IGNORE_DEFAULT = [
  'kotarot','katarot','cotarot','prpr','hin','promo','div_',
  '20_vtr_exit_KTC','20_vtr_back_CTK','20_vtr_wiper_KTK'
];

let ignoreList = [...IGNORE_DEFAULT];
let lastLineupIds = [];
let lastArchiveNames = [];
let lastDate = '';
let lineupFile = null;
let archiveFile = null;

const $ = id => document.getElementById(id);

function renderIgnoreTokens() {
  $('ignoreTokensDisplay').innerHTML = ignoreList
    .map(t => `<span class="ignore-token">${t}</span>`).join('');
}
renderIgnoreTokens();

// --- File inputs ---
$('fileLineup').addEventListener('change', e => {
  lineupFile = e.target.files[0] || null;
  $('nameLineup').textContent = lineupFile ? lineupFile.name : '';
  updateRunBtn();
});
$('fileArchive').addEventListener('change', e => {
  archiveFile = e.target.files[0] || null;
  $('nameArchive').textContent = archiveFile ? archiveFile.name : '';
  updateRunBtn();
});
function updateRunBtn() {
  $('btnRun').disabled = !(lineupFile && archiveFile);
}

function extractDateFromFilename(name) {
  const base = name.replace(/\.txt$/i, '');
  const m6 = base.match(/(\d{6})/);
  return m6 ? m6[1] : '';
}

// --- Run ---
$('btnRun').addEventListener('click', async () => {
  $('btnRun').disabled = true;
  $('statusMsg').className = 'status-msg';
  $('statusMsg').textContent = 'קורא קבצים...';
  try {
    const lineupText = await lineupFile.text();
    const archiveText = await archiveFile.text();
    lastDate = extractDateFromFilename(archiveFile.name);
    lastLineupIds = parseLineupIds(lineupText);
    lastArchiveNames = parseArchiveNames(archiveText);
    $('statusMsg').textContent = 'מריץ השוואה...';
    await new Promise(r => setTimeout(r, 120));
    runComparison(lastDate, lastLineupIds, lastArchiveNames, ignoreList);
    $('statusMsg').textContent = '';
  } catch (err) {
    $('statusMsg').className = 'status-msg err';
    $('statusMsg').textContent = 'שגיאה: ' + (err.message || err);
  } finally {
    $('btnRun').disabled = false;
  }
});

// --- Parsing ---
function cleanText(text) {
  return text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
}
function parseLineupIds(text) {
  return cleanText(text).split('\n')
    .map(line => line.trim()).filter(Boolean)
    .map(line => line.replace(/^(VTR|VO|SYNC)[:_\s]*/i, '').trim())
    .filter(Boolean);
}
function parseArchiveNames(text) {
  return cleanText(text).split('\n').map(line => line.trim()).filter(Boolean);
}

// --- Comparison ---
function stripVersion(id) { return id.replace(/[Vv]\d+$/, ''); }
function getBaseId(name) { return stripVersion(name.split('.')[0]); }
function extractDate6(id) {
  const m = id.match(/\d{6}/g);
  return m ? m[m.length - 1] : null;
}
function similarity(a, b) {
  const n = a.length, m = b.length;
  if (!n && !m) return 1;
  if (!n || !m) return 0;
  const dp = new Array(m + 1).fill(0);
  for (let i = 1; i <= n; i++) {
    let prev = 0;
    for (let j = 1; j <= m; j++) {
      const tmp = dp[j];
      dp[j] = a[i-1] === b[j-1] ? prev + 1 : Math.max(dp[j], dp[j-1]);
      prev = tmp;
    }
  }
  return (2 * dp[m]) / (n + m);
}

function runComparison(ddmmyy, lineupIds, archiveNames, ignore) {
  const archiveBases = archiveNames.map(n => getBaseId(n));
  const archiveBasesLow = archiveBases.map(b => b.toLowerCase());
  const archiveBaseSet = new Set(archiveBasesLow);
  const archiveFullLow = archiveNames.map(n => n.toLowerCase());

  function isIgnored(id) {
    const low = id.toLowerCase();
    return ignore.some(tok => low.includes(tok.toLowerCase()));
  }
  function exactMatch(id) { return archiveBaseSet.has(stripVersion(id).toLowerCase()); }
  function substringMatch(id) {
    const base = stripVersion(id).toLowerCase();
    for (const aFull of archiveFullLow) {
      const aBase = getBaseId(aFull);
      if (aBase.length > 10 && (aFull.includes(base) || base.includes(aBase))) return aBase;
    }
    return null;
  }
  function findNearMatch(id) {
    const low = stripVersion(id).toLowerCase();
    let best = 0, match = '';
    for (const ab of archiveBasesLow) {
      const s = similarity(low, ab);
      if (s > best) { best = s; match = ab; }
    }
    return (best >= 0.88 && !archiveBaseSet.has(low)) ? match : null;
  }

  const seenBases = new Set();
  const redItems = [], amberItems = [], grayItems = [], ignoredItems = [];
  let totalAfterFilter = 0, substringMatches = 0;

  for (const id of lineupIds) {
    if (isIgnored(id)) { ignoredItems.push(id); continue; }
    const base = stripVersion(id).toLowerCase();
    if (seenBases.has(base)) continue;
    seenBases.add(base);
    totalAfterFilter++;
    if (exactMatch(id)) continue;
    if (substringMatch(id)) { substringMatches++; continue; }
    const displayId = stripVersion(id);
    const d = extractDate6(id);
    if (!d) { grayItems.push({ id: displayId, warn: '' }); }
    else if (ddmmyy && d === ddmmyy) {
      const nm = findNearMatch(id);
      redItems.push({ id: displayId, warn: nm ? `⚠ ID דומה בתיקייה: ${nm}` : '' });
    } else {
      amberItems.push({ id: displayId, warn: '' });
    }
  }

  renderResults({ ddmmyy, totalAfterFilter, redItems, amberItems, grayItems, ignoredItems,
    lineupCount: lineupIds.length, archiveCount: archiveNames.length, substringMatches });
}

// --- Render ---
let lastResults = null;
function renderResults({ ddmmyy, totalAfterFilter, redItems, amberItems, grayItems, ignoredItems, lineupCount, archiveCount, substringMatches }) {
  lastResults = { ddmmyy, totalAfterFilter, redItems, amberItems, grayItems, ignoredItems };
  $('resultsCard').hidden = false;
  $('editCard').hidden = true;
  const dateDisplay = ddmmyy ? `${ddmmyy.slice(0,2)}/${ddmmyy.slice(2,4)}/${ddmmyy.slice(4)}` : 'לא זוהה';
  $('lamp').className = 'lamp ' + (redItems.length > 0 ? 'alert' : 'ok');
  $('chips').innerHTML =
    `<span class="chip">תאריך: <b>${dateDisplay}</b></span>` +
    `<span class="chip">פריטים לאחר סינון: <b>${totalAfterFilter}</b></span>` +
    `<span class="chip">חוסרים: <b style="color:var(--red)">${redItems.length}</b></span>`;
  $('badgeRed').textContent = redItems.length;
  $('badgeAmber').textContent = amberItems.length;
  $('badgeGray').textContent = grayItems.length;
  $('badgeExcluded').textContent = ignoredItems.length;
  $('grayCol').style.display = grayItems.length === 0 ? 'none' : '';

  function renderCol(items) {
    if (!items.length) return '<div class="empty-ok">אין ✓</div>';
    return items.map(it =>
      `<div class="id-row">${typeof it === 'string' ? it : it.id}${(it.warn) ? `<div class="warn-line">${it.warn}</div>` : ''}</div>`
    ).join('');
  }
  $('listRed').innerHTML = renderCol(redItems);
  $('listAmber').innerHTML = renderCol(amberItems);
  $('listGray').innerHTML = renderCol(grayItems);
  $('listExcluded').innerHTML = renderCol(ignoredItems);
  let info = `נקראו ${lineupCount} שורות מהליינאפ, ${archiveCount} שורות מהתיקייה`;
  if (substringMatches > 0) info += ` · ${substringMatches} התאמות בבדיקה משנית`;
  $('parseInfo').textContent = info;
  $('resultsCard').scrollIntoView({ behavior: 'smooth' });
}

// --- Edit ---
$('btnEdit').addEventListener('click', () => {
  $('editDate').value = lastDate;
  $('editLineup').value = lastLineupIds.join('\n');
  $('editArchive').value = lastArchiveNames.join('\n');
  $('editIgnore').value = ignoreList.join('\n');
  $('resultsCard').hidden = true;
  $('editCard').hidden = false;
  $('editCard').scrollIntoView({ behavior: 'smooth' });
});
$('btnCancelEdit').addEventListener('click', () => {
  $('editCard').hidden = true;
  $('resultsCard').hidden = false;
});
$('btnRunManual').addEventListener('click', () => {
  lastDate = $('editDate').value.trim();
  lastLineupIds = $('editLineup').value.split('\n').map(s => s.trim()).filter(Boolean);
  lastArchiveNames = $('editArchive').value.split('\n').map(s => s.trim()).filter(Boolean);
  ignoreList = $('editIgnore').value.split('\n').map(s => s.trim()).filter(Boolean);
  renderIgnoreTokens();
  runComparison(lastDate, lastLineupIds, lastArchiveNames, ignoreList);
});
$('btnReset').addEventListener('click', () => location.reload());

// --- Excel export ---
$('btnExport').addEventListener('click', () => {
  if (!lastResults) return;
  const { ddmmyy, totalAfterFilter, redItems, amberItems, grayItems, ignoredItems } = lastResults;
  const dateDisplay = ddmmyy ? `${ddmmyy.slice(0,2)}/${ddmmyy.slice(2,4)}/${ddmmyy.slice(4)}` : 'לא זוהה';
  const wb = XLSX.utils.book_new();
  const rows = [];
  rows.push(['בדיקת ליינאפ מול ארכיון — כאן חדשות', '', '']);
  rows.push([`תאריך נבדק: ${dateDisplay}    |    סה"כ פריטים אחרי סינון: ${totalAfterFilter}`, '', '']);
  rows.push(['', '', '']);
  rows.push(['קטגוריה', 'ID', 'הערה']);
  function addBlock(items, label) {
    if (!items.length) { rows.push([label, '(אין)', '']); return; }
    for (const it of items) rows.push([label, it.id, it.warn || '']);
  }
  addBlock(redItems, 'חסר בתיקייה (תאריך תואם)');
  addBlock(amberItems, 'חסר, תאריך אחר (אמור להיות מאורכב)');
  addBlock(grayItems, 'לא ניתן לקבוע תאריך');
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 32 }, { wch: 44 }, { wch: 34 }];
  ws['!merges'] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } },
  ];
  XLSX.utils.book_append_sheet(wb, ws, 'בדיקת ליינאפ');
  const igRows = [['ID שהוחרג (רשימת התעלמות)']];
  for (const id of ignoredItems) igRows.push([id]);
  const ws2 = XLSX.utils.aoa_to_sheet(igRows);
  ws2['!cols'] = [{ wch: 42 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'הוחרגו');
  XLSX.writeFile(wb, `archive_check_${ddmmyy || 'report'}.xlsx`);
});
</script>
</body>
</html>

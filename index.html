<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת ליינאפ מול ארכיון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --panel: #181b24;
  --panel2: #1e222d;
  --border: #282e3a;
  --text: #e4e1d8;
  --muted: #7e8694;
  --accent: #d4a24e;
  --accent-dim: #2e2618;
  --red: #d94a3f;
  --red-bg: #2a1614;
  --amber: #e0a332;
  --amber-bg: #2a2214;
  --green: #3fad6a;
  --green-bg: #142a1e;
  --gray-tag: #6b7585;
  --gray-bg: #1c1f28;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Heebo', sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 40px 20px 100px;
}
.wrap { max-width: 820px; margin: 0 auto; }

/* Header */
.header { margin-bottom: 36px; }
.brand {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.lamp {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted);
  transition: all .4s;
}
.lamp.ok { background: var(--green); box-shadow: 0 0 10px rgba(63,173,106,.5); }
.lamp.alert { background: var(--red); box-shadow: 0 0 10px rgba(217,74,63,.5); }
h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -.02em;
  margin-bottom: 6px;
}
.tagline {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}

/* Upload area */
.upload-zone {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px 28px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--accent);
  background: var(--panel2);
}
.upload-zone input { display: none; }
.upload-icon {
  font-size: 32px;
  margin-bottom: 10px;
  opacity: .7;
}
.upload-label {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}
.upload-hint {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.6;
}
.upload-files {
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  line-height: 1.8;
}
.upload-files .file-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-dim);
  border: 1px solid rgba(212,162,78,.25);
  padding: 4px 12px;
  border-radius: 6px;
  margin: 3px 4px;
}
.upload-files .file-role {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--sans);
  font-weight: 500;
}

/* Cards */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-top: 18px;
}
.card[hidden] { display: none; }
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Summary chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--muted);
  background: var(--panel2);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
}
.chip b { color: var(--text); }

/* Result blocks */
.result-block { margin-bottom: 18px; }
.result-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.result-label { font-size: 14px; font-weight: 700; }
.badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
}
.block-red .badge { background: var(--red-bg); color: var(--red); }
.block-amber .badge { background: var(--amber-bg); color: var(--amber); }
.block-gray .badge { background: var(--gray-bg); color: var(--gray-tag); }

.id-list {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.id-row {
  font-family: var(--mono);
  font-size: 12px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  direction: ltr;
  text-align: left;
}
.id-row:last-child { border-bottom: none; }
.block-red .id-row { background: rgba(217,74,63,.06); }
.block-amber .id-row { background: rgba(224,163,50,.04); }
.block-gray .id-row { background: rgba(107,117,133,.05); }
.warn-tag {
  font-size: 10.5px;
  color: var(--amber);
  font-family: var(--sans);
  white-space: nowrap;
}
.empty-ok {
  text-align: center;
  padding: 16px;
  color: var(--green);
  font-size: 13px;
  background: var(--green-bg);
  border-radius: 10px;
}

/* Ignored details */
details { margin-top: 8px; }
summary {
  cursor: pointer;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
}
.ignored-content {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  direction: ltr;
  text-align: left;
  line-height: 2;
}

/* Edit panel */
.edit-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 640px) { .edit-row { grid-template-columns: 1fr; } }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
}
textarea {
  width: 100%;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  padding: 12px;
  border-radius: 8px;
  resize: vertical;
  direction: ltr;
  text-align: left;
}
input[type=text] {
  width: 100%;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 9px 12px;
  border-radius: 8px;
}

/* Buttons */
.actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
button {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 13.5px;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  cursor: pointer;
  transition: filter .15s, transform .08s;
}
button:active { transform: scale(.97); }
button:disabled { opacity: .35; cursor: not-allowed; }
.btn-go { background: var(--accent); color: #1a1305; }
.btn-go:hover:not(:disabled) { filter: brightness(1.1); }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-ghost:hover { border-color: var(--muted); }

/* Ignore list inline */
.ignore-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.ignore-bar .il-label {
  font-size: 11.5px;
  color: var(--muted);
  white-space: nowrap;
}
.ignore-tokens {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.ignore-token {
  font-family: var(--mono);
  font-size: 10.5px;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 8px;
  border-radius: 4px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="brand"><span class="lamp" id="lamp"></span>בקרת ארכיון · כאן חדשות</div>
    <h1>בדיקת ליינאפ מול ארכיון</h1>
    <p class="tagline">מעלים שני קבצי טקסט — הליינאפ ותיקיית הארכיון — ומקבלים רשימת חוסרים מיידית.</p>
  </div>

  <!-- Upload -->
  <label class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt,text/plain" multiple>
    <div class="upload-icon">📂</div>
    <div class="upload-label">גררו לכאן שני קבצי TXT</div>
    <div class="upload-hint">קובץ ליינאפ (עם LINUP בשם) + קובץ תיקיית ארכיון (שם = תאריך, למשל 260825.txt)</div>
    <div class="upload-files" id="fileDisplay"></div>
  </label>

  <div class="ignore-bar">
    <span class="il-label">מוחרגים:</span>
    <div class="ignore-tokens" id="ignoreTokensDisplay"></div>
  </div>

  <!-- Results -->
  <div class="card" id="resultsCard" hidden>
    <div class="chips" id="chips"></div>

    <div class="result-block block-red">
      <div class="result-head">
        <span class="result-label">חסר בתיקייה — תאריך תואם</span>
        <span class="badge" id="badgeRed">0</span>
      </div>
      <div id="listRed"></div>
    </div>

    <div class="result-block block-amber">
      <div class="result-head">
        <span class="result-label">חסר, תאריך אחר (אמור להיות מאורכב)</span>
        <span class="badge" id="badgeAmber">0</span>
      </div>
      <div id="listAmber"></div>
    </div>

    <div class="result-block block-gray" id="grayBlock" hidden>
      <div class="result-head">
        <span class="result-label">לא ניתן לקבוע תאריך</span>
        <span class="badge" id="badgeGray">0</span>
      </div>
      <div id="listGray"></div>
    </div>

    <details>
      <summary id="ignoredSummary">פריטים שהוחרגו — 0</summary>
      <div class="ignored-content" id="ignoredList"></div>
    </details>

    <div class="actions">
      <button class="btn-ghost" id="btnEdit">עריכה ידנית</button>
      <button class="btn-ghost" id="btnReset">בדיקה חדשה</button>
    </div>
  </div>

  <!-- Manual edit panel -->
  <div class="card" id="editCard" hidden>
    <div class="card-title">עריכה ידנית</div>
    <div style="margin-bottom:14px;">
      <label class="field-label">תאריך נבדק (DDMMYY)</label>
      <input type="text" id="editDate" placeholder="260825">
    </div>
    <div class="edit-row">
      <div>
        <label class="field-label">ID-ים מהליינאפ</label>
        <textarea id="editLineup" rows="14"></textarea>
      </div>
      <div>
        <label class="field-label">שמות קבצים מהתיקייה</label>
        <textarea id="editArchive" rows="14"></textarea>
      </div>
    </div>
    <div style="margin-top:14px;">
      <label class="field-label">רשימת התעלמות (שורה לכל ערך)</label>
      <textarea id="editIgnore" rows="4"></textarea>
    </div>
    <div class="actions">
      <button class="btn-go" id="btnRunManual">השוואה</button>
      <button class="btn-ghost" id="btnCancelEdit">ביטול</button>
    </div>
  </div>

</div>

<script>
const IGNORE_DEFAULT = [
  'kotarot','katarot','cotarot','prpr','hin','promo','div_',
  '20_vtr_exit_KTC','20_vtr_back_CTK','20_vtr_wiper_KTK'
];

let ignoreList = [...IGNORE_DEFAULT];
let lastLineupIds = [];
let lastArchiveNames = [];
let lastDate = '';

const $ = id => document.getElementById(id);

// Show ignore tokens
function renderIgnoreTokens() {
  $('ignoreTokensDisplay').innerHTML = ignoreList
    .map(t => `<span class="ignore-token">${t}</span>`).join('');
}
renderIgnoreTokens();

// --- File handling ---
const dropZone = $('dropZone');
const fileInput = $('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  handleFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));

function classifyFiles(files) {
  // Find which is lineup (LINUP in name) and which is archive (date-only name)
  let lineup = null, archive = null;
  for (const f of files) {
    const name = f.name.toUpperCase();
    if (name.includes('LINUP')) lineup = f;
    else archive = f;
  }
  // If we couldn't classify by LINUP, try the other way: date-only name
  if (!lineup && !archive && files.length === 2) {
    // The one with fewer non-digit chars in the basename is probably the date file
    const base = f => f.name.replace(/\.txt$/i, '');
    const isDateName = f => /^\d{6}$/.test(base(f));
    for (const f of files) {
      if (isDateName(f)) archive = f;
      else lineup = f;
    }
  }
  return { lineup, archive };
}

function extractDateFromFilename(name) {
  const base = name.replace(/\.txt$/i, '');
  const m6 = base.match(/(\d{6})/);
  if (m6) return m6[1]; // DDMMYY
  return '';
}

async function handleFiles(files) {
  const txtFiles = files.filter(f => f.name.toLowerCase().endsWith('.txt'));
  if (txtFiles.length < 2) {
    $('fileDisplay').innerHTML = '<span style="color:var(--red)">צריך בדיוק שני קבצי TXT</span>';
    return;
  }

  const { lineup, archive } = classifyFiles(txtFiles.slice(0, 2));
  if (!lineup || !archive) {
    $('fileDisplay').innerHTML = '<span style="color:var(--red)">לא הצלחתי לזהות מי הליינאפ ומי הארכיון — ודאו ששם הליינאפ מכיל LINUP</span>';
    return;
  }

  $('fileDisplay').innerHTML =
    `<span class="file-tag">${lineup.name} <span class="file-role">ליינאפ</span></span>` +
    `<span class="file-tag">${archive.name} <span class="file-role">ארכיון</span></span>`;

  const lineupText = await lineup.text();
  const archiveText = await archive.text();

  lastDate = extractDateFromFilename(archive.name);
  lastLineupIds = parseLineupIds(lineupText);
  lastArchiveNames = parseArchiveNames(archiveText);

  runComparison(lastDate, lastLineupIds, lastArchiveNames, ignoreList);
}

// --- Parsing ---
function parseLineupIds(text) {
  return text.split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => line.replace(/^(VTR|VO|SYNC)[:_\s]*/i, '').trim())
    .filter(Boolean);
}

function parseArchiveNames(text) {
  return text.split('\n')
    .map(line => line.trim())
    .filter(Boolean);
}

// --- Comparison engine ---
function stripVersion(id) {
  return id.replace(/[Vv]\d+$/, '');
}

function getBaseId(archiveName) {
  // Take everything before the first dot, then strip version
  const beforeDot = archiveName.split('.')[0];
  return stripVersion(beforeDot);
}

function extractDate6(id) {
  const matches = id.match(/\d{6}/g);
  return matches ? matches[matches.length - 1] : null;
}

function similarity(a, b) {
  // LCS-based similarity
  const n = a.length, m = b.length;
  const dp = new Array(m + 1).fill(0);
  for (let i = 1; i <= n; i++) {
    let prev = 0;
    for (let j = 1; j <= m; j++) {
      const tmp = dp[j];
      if (a[i-1] === b[j-1]) dp[j] = prev + 1;
      else dp[j] = Math.max(dp[j], dp[j-1]);
      prev = tmp;
    }
  }
  return (2 * dp[m]) / (n + m);
}

function runComparison(ddmmyy, lineupIds, archiveNames, ignore) {
  const archiveBases = archiveNames.map(n => getBaseId(n).toLowerCase());
  const archiveBaseSet = new Set(archiveBases);

  function isIgnored(id) {
    const low = id.toLowerCase();
    return ignore.some(tok => low.includes(tok.toLowerCase()));
  }

  function existsInArchive(id) {
    const base = stripVersion(id).toLowerCase();
    return archiveBaseSet.has(base);
  }

  const seenBases = new Set();
  const redItems = [], amberItems = [], grayItems = [], ignoredItems = [];
  let totalAfterFilter = 0;

  for (const id of lineupIds) {
    if (isIgnored(id)) { ignoredItems.push(id); continue; }

    const base = stripVersion(id).toLowerCase();
    if (seenBases.has(base)) continue;
    seenBases.add(base);
    totalAfterFilter++;

    if (existsInArchive(id)) continue;

    const displayId = stripVersion(id);
    const d = extractDate6(id);

    if (!d) {
      grayItems.push({ id: displayId, warn: '' });
    } else if (ddmmyy && d === ddmmyy) {
      // Check near-match
      let warn = '';
      let bestScore = 0, bestMatch = '';
      for (const ab of archiveBases) {
        const s = similarity(displayId.toLowerCase(), ab);
        if (s > bestScore) { bestScore = s; bestMatch = ab; }
      }
      if (bestScore >= 0.88 && !archiveBaseSet.has(displayId.toLowerCase())) {
        warn = `⚠ ID דומה בתיקייה: ${bestMatch}`;
      }
      redItems.push({ id: displayId, warn });
    } else {
      amberItems.push({ id: displayId, warn: '' });
    }
  }

  renderResults({
    ddmmyy,
    totalAfterFilter,
    redItems,
    amberItems,
    grayItems,
    ignoredItems
  });
}

// --- Render ---
function renderResults({ ddmmyy, totalAfterFilter, redItems, amberItems, grayItems, ignoredItems }) {
  $('resultsCard').hidden = false;
  $('editCard').hidden = true;

  const dateDisplay = ddmmyy
    ? `${ddmmyy.slice(0,2)}/${ddmmyy.slice(2,4)}/${ddmmyy.slice(4)}`
    : 'לא זוהה';

  $('lamp').className = 'lamp ' + (redItems.length > 0 ? 'alert' : 'ok');

  $('chips').innerHTML =
    `<span class="chip">תאריך: <b>${dateDisplay}</b></span>` +
    `<span class="chip">פריטים לאחר סינון: <b>${totalAfterFilter}</b></span>` +
    `<span class="chip">חוסרים: <b style="color:var(--red)">${redItems.length}</b></span>`;

  $('badgeRed').textContent = redItems.length;
  $('badgeAmber').textContent = amberItems.length;
  $('badgeGray').textContent = grayItems.length;
  $('grayBlock').hidden = grayItems.length === 0;

  function renderList(items) {
    if (!items.length) return '<div class="empty-ok">אין ✓</div>';
    return '<div class="id-list">' + items.map(it =>
      `<div class="id-row"><span>${it.id}</span>${it.warn ? `<span class="warn-tag">${it.warn}</span>` : ''}</div>`
    ).join('') + '</div>';
  }

  $('listRed').innerHTML = renderList(redItems);
  $('listAmber').innerHTML = renderList(amberItems);
  $('listGray').innerHTML = renderList(grayItems);

  $('ignoredSummary').textContent = `פריטים שהוחרגו — ${ignoredItems.length}`;
  $('ignoredList').textContent = ignoredItems.join('\n');

  $('resultsCard').scrollIntoView({ behavior: 'smooth' });
}

// --- Edit panel ---
$('btnEdit').addEventListener('click', () => {
  $('editDate').value = lastDate;
  $('editLineup').value = lastLineupIds.join('\n');
  $('editArchive').value = lastArchiveNames.join('\n');
  $('editIgnore').value = ignoreList.join('\n');
  $('resultsCard').hidden = true;
  $('editCard').hidden = false;
  $('editCard').scrollIntoView({ behavior: 'smooth' });
});

$('btnCancelEdit').addEventListener('click', () => {
  $('editCard').hidden = true;
  $('resultsCard').hidden = false;
});

$('btnRunManual').addEventListener('click', () => {
  lastDate = $('editDate').value.trim();
  lastLineupIds = $('editLineup').value.split('\n').map(s => s.trim()).filter(Boolean);
  lastArchiveNames = $('editArchive').value.split('\n').map(s => s.trim()).filter(Boolean);
  ignoreList = $('editIgnore').value.split('\n').map(s => s.trim()).filter(Boolean);
  renderIgnoreTokens();
  runComparison(lastDate, lastLineupIds, lastArchiveNames, ignoreList);
});

$('btnReset').addEventListener('click', () => {
  location.reload();
});
</script>
</body>
</html>
